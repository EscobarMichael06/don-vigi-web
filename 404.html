<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Página no encontrada · DON VIGI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1B3A6B;
      --primary-light: #2C5FA0;
      --accent: #D4890A;
      --accent-light: #F2A321;
      --bg-main: #F8F9FB;
      --surface: #FFFFFF;
      --text: #1E293B;
      --muted: #64748B;
      --border: #E2E8F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .error-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      padding: 60px 40px;
      border-radius: 35px;
      box-shadow: 0 20px 50px rgba(27, 58, 107, 0.05);
      max-width: 550px;
      width: 100%;
    }

    .error-code {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      letter-spacing: -4px;
    }

    .error-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }

    .error-desc {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 35px;
      line-height: 1.7;
    }

    .btn-home {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 16px 36px;
      border-radius: 100px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(27, 58, 107, 0.15);
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      background: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(27, 58, 107, 0.25);
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-desc">
      Lo sentimos, la página que estás buscando no existe, ha sido eliminada o su dirección cambió temporalmente.
    </p>
    <a href="/" class="btn-home">Volver al Inicio</a>
  </div>

</body>
</html>
